# Parameter Golf — Consensus Stack Configuration
# Source of truth for env vars passed to train_gpt.py / train_gpt_mlx.py
# Updated 2026-03-19: adopted competition-converged settings from 18 PR scrape.
# Usage: run_probe.sh reads this and exports all UPPER_CASE keys as env vars.

best_bpb: 1.2244
best_bpb_prequant: 1.2172
artifact_bytes: 15863489
artifact_limit: 16000000

# --- Model ---
VOCAB_SIZE: 1024
NUM_LAYERS: 9
MODEL_DIM: 512
NUM_HEADS: 8
NUM_KV_HEADS: 4
MLP_MULT: 3
TIE_EMBEDDINGS: 1
TIED_EMBED_INIT_STD: 0.005
LOGIT_SOFTCAP: 30.0
ROPE_BASE: 10000.0
QK_GAIN_INIT: 1.5

# --- Training ---
TRAIN_BATCH_TOKENS: 786432
TRAIN_SEQ_LEN: 2048
ITERATIONS: 20000
WARMUP_STEPS: 20
WARMDOWN_ITERS: 3000
MAX_WALLCLOCK_SECONDS: 600
SEED: 1337

# --- Optimizer ---
TIED_EMBED_LR: 0.03
EMBED_LR: 0.6
HEAD_LR: 0.008
MATRIX_LR: 0.02
SCALAR_LR: 0.02
MUON_MOMENTUM: 0.99
MUON_BACKEND_STEPS: 5
MUON_MOMENTUM_WARMUP_START: 0.92
MUON_MOMENTUM_WARMUP_STEPS: 1500
BETA1: 0.9
BETA2: 0.95
ADAM_EPS: 1.0e-8
GRAD_CLIP_NORM: 0.3

# --- Validation ---
VAL_BATCH_SIZE: 524288
VAL_LOSS_EVERY: 1000
TRAIN_LOG_EVERY: 200

# --- Sliding Window Eval ---
EVAL_STRIDE: 256

# --- Quantization / Compression ---
QUANT_MAX: 31
COMPRESSOR: zstd
EMBED_FP16: 1
LATE_K_FP16: 1
LATE_K_LAYERS: 2

# --- STE QAT (fake int6 quantization during training) ---
QAT_ENABLED: 1

# --- NorMuon (per-row second-moment normalization in Muon) ---
NORMUON_BETA2: 0.95

# --- SWA (Stochastic Weight Averaging during warmdown) ---
SWA_ENABLED: 1
SWA_START_FRAC: 0.5
SWA_EVERY: 200

# --- SmearGate (bigram preprocessing, 512 params) ---
SMEARGATE_ENABLED: 1

# --- MTP (Multi-Token Prediction auxiliary objective) ---
MTP_NUM_HEADS: 1
MTP_LOSS_WEIGHT: 0.1

# --- Data ---
DATA_PATH: ./data/datasets/fineweb10B_sp1024
TOKENIZER_PATH: ./data/tokenizers/fineweb_1024_bpe.model

# --- Profiling ---
PROFILE_SECTIONS: 0

# --- Early Stopping ---
EARLY_STOP: 1
EARLY_STOP_REF: ""
EARLY_STOP_TOLERANCE: 0.05
EARLY_STOP_MIN_STEP: 500
EARLY_STOP_PATIENCE: 3

