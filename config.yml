# Parameter Golf — SOTA Rebase Configuration (PR #315)
# Source of truth for env vars passed to train_gpt.py
# Updated 2026-03-22: SOTA rebase from PR #315 (1.1248 BPB, 26.8M params, 11 unique layers)
# Usage: run_probe.sh reads this and exports all UPPER_CASE keys as env vars.

best_bpb: 1.1248
best_bpb_prequant: 1.1418
artifact_bytes: 15612308
artifact_limit: 16000000

# --- Model ---
VOCAB_SIZE: 1024
NUM_LAYERS: 11
MODEL_DIM: 512
NUM_HEADS: 8
NUM_KV_HEADS: 4
MLP_MULT: 3
TIE_EMBEDDINGS: 1
TIED_EMBED_INIT_STD: 0.005
LOGIT_SOFTCAP: 30.0
ROPE_BASE: 10000.0
QK_GAIN_INIT: 1.5

# --- SOTA Architecture Features ---
XSA_LAST_N: 4
ROPE_DIMS: 16
LN_SCALE: 1
BIGRAM_VOCAB_SIZE: 2048
BIGRAM_DIM: 128

# --- Training ---
TRAIN_BATCH_TOKENS: 786432
TRAIN_SEQ_LEN: 2048
ITERATIONS: 9000
WARMUP_STEPS: 20
WARMDOWN_ITERS: 3000
MAX_WALLCLOCK_SECONDS: 600
SEED: 1337

# --- Optimizer ---
TIED_EMBED_LR: 0.035
EMBED_LR: 0.6
HEAD_LR: 0.008
MATRIX_LR: 0.025
SCALAR_LR: 0.025
MUON_MOMENTUM: 0.99
MUON_BACKEND_STEPS: 5
MUON_MOMENTUM_WARMUP_START: 0.92
MUON_MOMENTUM_WARMUP_STEPS: 1500
BETA1: 0.9
BETA2: 0.95
ADAM_EPS: 1.0e-8
GRAD_CLIP_NORM: 0.3
MUON_WD: 0.04
ADAM_WD: 0.04
MUON_BETA2: 0.95

# --- Validation ---
VAL_BATCH_SIZE: 524288
VAL_LOSS_EVERY: 1000
TRAIN_LOG_EVERY: 200

# --- Sliding Window Eval ---
EVAL_STRIDE: 64

# --- Quantization / Compression ---
# SOTA uses int6 mixed quantization + zstd level 22 (handled in code)

# --- STE QAT ---
QAT_ENABLED: 0
LATE_QAT: 1
QAT_THRESHOLD: 0.1
QAT_BITS: 6

# --- EMA (replaces SWA) ---
EMA_ENABLED: 1
EMA_DECAY: 0.997
SWA_ENABLED: 0
SWA_EVERY: 200

# --- MTP (Multi-Token Prediction) ---
MTP_NUM_HEADS: 0
MTP_LOSS_WEIGHT: 0.2

# --- MoE (Mixture of Experts) ---
MOE_ENABLED: 0
MOE_NUM_EXPERTS: 2
MOE_AUX_LOSS_WEIGHT: 0.01

# --- Data ---
DATA_PATH: ./data/datasets/fineweb10B_sp1024
TOKENIZER_PATH: ./data/tokenizers/fineweb_1024_bpe.model

# --- Speed Probes ---
SKIP_ROUNDTRIP: 1

# --- Profiling ---
PROFILE_SECTIONS: 0
PROFILE_KERNELS: 0

# --- Early Stopping ---
EARLY_STOP: 1
EARLY_STOP_REF: ""
EARLY_STOP_TOLERANCE: 0.05
EARLY_STOP_MIN_STEP: 500
EARLY_STOP_PATIENCE: 3

